name: Sync Goose data

# Keeps the live site current by re-pulling elgoose.net into the database. The
# web app only reads, so all writes happen here, out of band.

on:
  schedule:
    # Daily at 09:12 UTC (early morning in the US). Off the top of the hour, as
    # GitHub recommends, to avoid the cron stampede.
    - cron: "12 9 * * *"
  workflow_dispatch: {} # manual "Run workflow" button on the Actions tab

# Never let two syncs overlap.
concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Apply schema migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:migrate
      - name: Sync elgoose → database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ELGOOSE_USER_AGENT: "GooseIndex/1.0 (+https://github.com/tsvb/goose-index; nightly sync)"
        run: npm run sync
      - name: Verify integrity
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run verify
