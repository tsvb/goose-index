<svg viewBox="0 0 720 952" width="720" height="952" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Goosemas 2026: the weekend schedule, VIP ticket prices, and travel package prices on one card">
  <!-- Self-contained card in the site's default (dark almanac) tokens.
       Colour keeps one meaning: gold marks structure — day markers, section
       eyebrows, rules stay in line tokens; every number wears ink. -->
  <style>
    .eyebrow { font: 11px "Courier Prime", "Courier New", monospace; letter-spacing: 2px; fill: #edab44; }
    .title   { font: 30px Georgia, "Times New Roman", serif; fill: #f3ead9; }
    .sub     { font: 12px "Courier Prime", "Courier New", monospace; fill: #b6a585; }
    .day     { font: 22px Georgia, "Times New Roman", serif; fill: #edab44; }
    .wk      { font: 10.5px "Courier Prime", "Courier New", monospace; letter-spacing: 1.5px; fill: #94856b; }
    .event   { font: 13px Georgia, "Times New Roman", serif; fill: #f3ead9; }
    .note    { font: 10.5px "Courier Prime", "Courier New", monospace; fill: #94856b; }
    .tier    { font: 17px Georgia, "Times New Roman", serif; fill: #f3ead9; }
    .price   { font: 13px "Courier Prime", "Courier New", monospace; fill: #f3ead9; }
    .perk    { font: 11px "Courier Prime", "Courier New", monospace; fill: #b6a585; }
    .colhead { font: 10px "Courier Prime", "Courier New", monospace; letter-spacing: 1px; fill: #94856b; }
    .hotel   { font: 14.5px Georgia, "Times New Roman", serif; fill: #f3ead9; }
    .cell    { font: 12.5px "Courier Prime", "Courier New", monospace; fill: #f3ead9; }
    .dash    { font: 12.5px "Courier Prime", "Courier New", monospace; fill: #94856b; }
    .foot    { font: 10.5px "Courier Prime", "Courier New", monospace; fill: #94856b; }
  </style>

  <rect x="0" y="0" width="720" height="952" fill="#15110c"/>
  <rect x="0.5" y="0.5" width="719" height="951" fill="none" stroke="#362b1e"/>

  <!-- header -->
  <text class="eyebrow" x="44" y="58">GOOSEMAS 2026 · VIP + TRAVEL ON SALE TUE, JULY 21 · 10 AM ET</text>
  <text class="title" x="44" y="96">The packages, laid out</text>
  <text class="sub" x="44" y="120">Goose at Jim Whelan Boardwalk Hall · Atlantic City, NJ</text>

  <!-- the weekend -->
  <line x1="44" y1="156" x2="676" y2="156" stroke="#2a2117"/>
  <circle cx="48" cy="156" r="3" fill="#edab44"/>
  <circle cx="264" cy="156" r="3" fill="#edab44"/>
  <circle cx="480" cy="156" r="3" fill="#edab44"/>

  <text class="wk" x="44" y="182">THURSDAY</text>
  <text class="day" x="44" y="208">Dec 10</text>
  <text class="event" x="44" y="230">Night Zero kickoff party</text>
  <text class="note" x="44" y="248">TBA · Super TED guests only</text>

  <text class="wk" x="260" y="182">FRIDAY</text>
  <text class="day" x="260" y="208">Dec 11</text>
  <text class="event" x="260" y="230">Goose, night one</text>
  <text class="note" x="260" y="248">Boardwalk Hall</text>

  <text class="wk" x="476" y="182">SATURDAY</text>
  <text class="day" x="476" y="208">Dec 12</text>
  <text class="event" x="476" y="230">Goose, night two</text>
  <text class="note" x="476" y="248">afterparty after the show · TBA</text>

  <!-- VIP tickets -->
  <text class="eyebrow" x="44" y="300">VIP TICKETS — PER PERSON, PLUS FEES AND TAXES</text>
  <line x1="44" y1="310" x2="676" y2="310" stroke="#362b1e"/>

  <text class="tier" x="44" y="344">Super TED VIP · both nights</text>
  <text class="price" x="676" y="344" text-anchor="end">$764 floor · $824 front 2 rows</text>
  <text class="perk" x="44" y="364">Soundboard viewing · Shenanigans lounge · Night Zero · family photo · foil poster</text>
  <line x1="44" y1="380" x2="676" y2="380" stroke="#2a2117"/>

  <text class="tier" x="44" y="412">TED VIP · both nights</text>
  <text class="price" x="676" y="412" text-anchor="end">$519 floor · $579 front 7 rows</text>
  <text class="perk" x="44" y="432">Dedicated TED bar · Saturday afterparty · paper poster · early merch entry</text>
  <line x1="44" y1="448" x2="676" y2="448" stroke="#2a2117"/>

  <text class="tier" x="44" y="480">TED VIP · one night</text>
  <text class="price" x="676" y="480" text-anchor="end">$275 Friday · $305 Saturday</text>
  <text class="perk" x="44" y="500">Night-of perks without the afterparty · floor or front 7 rows, same price</text>

  <!-- travel packages -->
  <text class="eyebrow" x="44" y="560">TRAVEL PACKAGES FOR TWO — HOTEL + BOTH SHOWS, FEES + TAXES INCLUDED</text>
  <line x1="44" y1="570" x2="676" y2="570" stroke="#362b1e"/>

  <text class="colhead" x="356" y="596" text-anchor="end">GA / PREM RES</text>
  <text class="colhead" x="484" y="596" text-anchor="end">TED VIP · GA</text>
  <text class="colhead" x="600" y="596" text-anchor="end">SUPER TED · GA</text>
  <text class="colhead" x="676" y="596" text-anchor="end">+ THU</text>

  <text class="hotel" x="44" y="626">Ocean Casino Resort</text>
  <text class="cell" x="356" y="626" text-anchor="end">$1,668.14</text>
  <text class="cell" x="484" y="626" text-anchor="end">$2,352.94</text>
  <text class="cell" x="600" y="626" text-anchor="end">$2,877.24</text>
  <text class="cell" x="676" y="626" text-anchor="end">$176.55</text>
  <line x1="44" y1="640" x2="676" y2="640" stroke="#2a2117"/>

  <text class="hotel" x="44" y="662">Tropicana Atlantic City</text>
  <text class="cell" x="356" y="662" text-anchor="end">$1,496.94</text>
  <text class="cell" x="484" y="662" text-anchor="end">$2,181.74</text>
  <text class="cell" x="600" y="662" text-anchor="end">$2,706.04</text>
  <text class="cell" x="676" y="662" text-anchor="end">$138.45</text>
  <line x1="44" y1="676" x2="676" y2="676" stroke="#2a2117"/>

  <text class="hotel" x="44" y="698">Borgata Hotel Casino &amp; Spa</text>
  <text class="cell" x="356" y="698" text-anchor="end">$1,389.94</text>
  <text class="cell" x="484" y="698" text-anchor="end">$2,074.74</text>
  <text class="cell" x="600" y="698" text-anchor="end">$2,599.04</text>
  <text class="cell" x="676" y="698" text-anchor="end">$165.85</text>
  <line x1="44" y1="712" x2="676" y2="712" stroke="#2a2117"/>

  <text class="hotel" x="44" y="734">MGM Tower at Borgata</text>
  <text class="cell" x="356" y="734" text-anchor="end">$1,475.54</text>
  <text class="cell" x="484" y="734" text-anchor="end">$2,160.34</text>
  <text class="cell" x="600" y="734" text-anchor="end">$2,684.64</text>
  <text class="cell" x="676" y="734" text-anchor="end">$187.25</text>
  <line x1="44" y1="748" x2="676" y2="748" stroke="#2a2117"/>

  <text class="hotel" x="44" y="770">Courtyard by Marriott</text>
  <text class="cell" x="356" y="770" text-anchor="end">$1,122.44</text>
  <text class="dash" x="484" y="770" text-anchor="end">—</text>
  <text class="dash" x="600" y="770" text-anchor="end">—</text>
  <text class="cell" x="676" y="770" text-anchor="end">$133.75</text>

  <text class="foot" x="44" y="806">Premium Reserved seating adds exactly $128.40 to any TED or Super TED package, at every hotel.</text>
  <text class="foot" x="44" y="824">Check-in Friday, check-out Sunday; add a Thursday night from the price in the last column.</text>

  <!-- footer -->
  <line x1="44" y1="856" x2="676" y2="856" stroke="#362b1e"/>
  <text class="foot" x="44" y="884">Prices as posted July 20, 2026 at goose2026.100xhospitality.com — that page is the box office;</text>
  <text class="foot" x="44" y="902">this card is a reading of it. VIP prices are per person; travel packages are the price for two.</text>
  <text class="foot" x="676" y="930" text-anchor="end" fill="#edab44">gooseindex.com</text>
</svg>
